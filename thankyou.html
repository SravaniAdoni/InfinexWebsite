<!DOCTYPE html>
<html>

        body{

            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:#f5f7fa;
        }

        .box{
            text-align:center;
            padding:40px;
            background:#fff;

            box-shadow:0 5px 15px rgba(0,0,0,.15);
            max-width:500px;
        }

        h1{
            color:#014983;
        }

        p{
            color:#555;
            font-size:18px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#014983;
            color:#fff;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Thank You!</h1>
    <p>Your enquiry has been submitted successfully.</p>

</html>
